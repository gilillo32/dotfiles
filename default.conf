[ids]
*

[main]
# CapsLock activa la capa 'nav'. Si la pulsas solo una vez, no hace nada (noop).
capslock = overload(nav, noop)

# IMPORTANTE: No definas 'esc' aquí. Si no aparece en [main], 
# la tecla física Escape seguirá funcionando normal para salir de Vim o menús.

[shift]
capslock = capslock

[nav]
# Cuando mantienes CapsLock:
# Caps + Esc = Backtick (`)
esc = `

# Cuando mantienes CapsLock + Shift + Esc:
# La "S-" indica que Shift está pulsado dentro de la capa
S-esc = ~

# --- El resto de tu navegación ---
l = home
. = end
semicolon = pageup
apostrophe = pagedown
slash = up
rightalt = left
rightcontrol = right
menu = down
w = up
a = left
s = down
d = right
backspace = delete
