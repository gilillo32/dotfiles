[ids]
*

[main]
# CapsLock se convierte en la tecla para activar la capa "nav" al mantenerla pulsada
capslock = overload(nav, capslock)

# Tu lógica de Escape: Esc solo hace ` (grave), con Shift hace ~ (tilde)
esc = `
# En keyd, shift+key se define automáticamente, pero puedes ser específico:
[shift]
esc = ~

[nav]
# Aquí defines qué hacen las teclas cuando mantienes CapsLock (tu Mode_Switch)
l = home
. = end
; = pageup
' = pagedown
/ = up
rightalt = left
rightcontrol = right
menu = down

# WASD como flechas (que también tenías al final)
w = up
a = left
s = down
d = right

# Funciones para los números
1 = f1
2 = f2
3 = f3
4 = f4
5 = f5
6 = f6
7 = f7
8 = f8
9 = f9
0 = f10

# Borrar hacia adelante con Backspace en la capa nav
backspace = delete
